# Render Blueprint: the Next.js frontend + token endpoint only.
#
# The Python agent worker no longer runs on Render — it's deployed to LiveKit
# Cloud Agents (`lk agent`; see fish/livekit.toml, agent id CA_AGy6MPJtaKPR,
# region us-east, dispatch name `fish-demo`). Render hosts just the web service,
# which serves the landing page and the /api/token route that mints LiveKit
# access tokens. The worker's provider secrets (Fish / Deepgram / OpenAI / the
# Gemma LLM) live as Cloud Agent secrets (`lk agent secrets`), not here.
#
# Setup (one time):
#   1. Push this repo to GitHub.
#   2. In the Render dashboard: New → Blueprint → pick this repo.
#   3. Fill in the env-var group `livekit-demo-shared` with your LiveKit Cloud
#      project's URL + API key/secret — the SAME project the agent is deployed
#      to, or named dispatch finds no worker and calls hang.
#
# Plan: web runs on Starter so it never sleeps. It can drop to Render's free tier
# to save money, but that spins down after ~15 min idle (cold-start ~50s).

services:
  # Next.js frontend: serves the landing page + the /api/token route that mints
  # LiveKit access tokens. Must point at the SAME LiveKit Cloud project the agent
  # is deployed to (named dispatch `fish-demo`).
  - type: web
    name: livekit-demo-web
    runtime: node
    rootDir: web
    plan: starter
    buildCommand: pnpm install --frozen-lockfile && pnpm build
    startCommand: pnpm start
    autoDeploy: true
    envVars:
      - fromGroup: livekit-demo-shared

envVarGroups:
  - name: livekit-demo-shared
    envVars:
      # LiveKit Cloud project the agent is deployed to. The token route mints room
      # tokens against these; the browser connects to this project and the Cloud
      # agent (`fish-demo`) is dispatched in. The agent worker is NOT here, so no
      # provider/LLM keys are needed — those are Cloud Agent secrets.
      - key: LIVEKIT_URL
        sync: false
      - key: LIVEKIT_API_KEY
        sync: false
      - key: LIVEKIT_API_SECRET
        sync: false
